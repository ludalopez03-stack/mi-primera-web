<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página Web</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
        }
        h1 { color: #1a73e8; margin-top: 0; }
        p { font-size: 16px; line-height: 1.6; color: #5f6368; }
        .cohete { font-size: 50px; margin-bottom: 10px; }
        .status {
            background-color: #e6f4ea;
            color: #137333;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="cohete">🚀</div>
        <h1>¡Mi sitio web está en vivo!</h1>
        <p>Este es un diseño HTML real creado desde cero y publicado en internet de forma gratuita a través de GitHub Pages.</p>
        <span class="status">Despliegue Exitoso</span>
    </div>
</body>
</html>
